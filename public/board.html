<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공용 보드 · 다음 작업 위치</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body class="bg-slate-900 min-h-screen text-white">
  <div class="max-w-7xl mx-auto px-6 py-6">
    <div class="flex items-center justify-between mb-5">
      <h1 class="text-4xl font-extrabold tracking-tight">다음 작업 위치</h1>
      <div class="text-right text-slate-400">
        <div id="clock" class="text-2xl font-mono"></div>
        <div id="stat" class="text-sm"></div>
      </div>
    </div>
    <div id="hint" class="text-slate-400 mb-4 text-lg">휴게 후 복귀하면 본인 이름 옆의 도크로 가세요.</div>
    <div id="board" class="grid gap-3" style="grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));"></div>
  </div>

  <script src="/common.js"></script>
  <script src="/board.js"></script>
</body>
</html>
