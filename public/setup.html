<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>세팅 · 자동 배치</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800">
  <div class="max-w-4xl mx-auto px-5 py-8">
    <div class="flex items-center justify-between mb-1">
      <h1 class="text-2xl font-bold">세팅</h1>
      <a href="/" class="text-sm text-slate-500 hover:underline">← 홈</a>
    </div>
    <p class="text-slate-500 mb-5 text-sm">가동할 도크를 켜고(체크), 각 도크의 시작 작업자 이름을 입력하세요. 체크 해제 = 오늘 비가동.</p>

    <div class="mb-5 bg-white rounded-2xl shadow p-4">
      <label class="block text-sm font-semibold mb-1" for="startAt">작업 시작 시각</label>
      <input type="datetime-local" id="startAt" class="w-full border rounded-lg px-3 py-2 text-sm" />
      <p class="text-xs text-slate-500 mt-1">이 시각부터 1시간 동안은 빠른 배정(4초)이 적용됩니다.</p>
    </div>

    <div class="mb-5 bg-white rounded-2xl shadow p-4">
      <label class="block text-sm font-semibold mb-1">밥시간</label>
      <div class="flex items-center gap-2">
        <input type="time" id="mealStart" class="flex-1 min-w-0 border rounded-lg px-2 py-2 text-sm" />
        <span class="text-slate-400 shrink-0">~</span>
        <input type="time" id="mealEnd" class="flex-1 min-w-0 border rounded-lg px-2 py-2 text-sm" />
      </div>
      <p class="text-xs text-slate-500 mt-1">밥시간이 끝난 뒤 1시간이 빠른 배정 구간 → <b id="fastWindowHint" class="text-orange-600">—</b></p>
    </div>

    <div class="mb-5 bg-white rounded-2xl shadow p-4">
      <label class="block text-sm font-semibold mb-1" for="commandos">특공대 명단 <span class="text-slate-400 font-normal">(선택)</span></label>
      <textarea id="commandos" rows="2" class="w-full border rounded-lg px-3 py-2 text-sm" placeholder="쉼표 또는 줄바꿈으로 구분 (예: 홍길동, 김철수)"></textarea>
      <p class="text-xs text-slate-500 mt-1">FIFO 로테이션과 별개인 별도 인원. 대기 도크 메꾸기·작업 도움에 투입합니다.</p>
    </div>

    <div class="flex flex-wrap gap-2 mb-5 text-sm">
      <button id="allOn" class="px-3 py-1.5 rounded-lg bg-slate-200 hover:bg-slate-300">전체 가동</button>
      <span id="liveCount" class="px-3 py-1.5 rounded-lg bg-blue-50 text-blue-700 font-medium"></span>
    </div>

    <div id="zones" class="grid gap-6 sm:grid-cols-2"></div>

    <div class="mt-6 flex items-center gap-3">
      <button id="save" class="px-5 py-2.5 rounded-xl bg-blue-600 text-white font-semibold hover:bg-blue-700">세팅 저장 &amp; 시작</button>
      <span id="msg" class="text-sm"></span>
    </div>
  </div>

  <script src="/common.js"></script>
  <script src="/setup.js"></script>
</body>
</html>
