<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자동 배치</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800">
  <div class="max-w-3xl mx-auto px-5 py-10">
    <h1 class="text-3xl font-bold mb-1">물류 도크 자동 배치</h1>
    <p class="text-slate-500 mb-8">작업자 배치를 자동으로. 화면을 선택하세요.</p>

    <div id="summary" class="mb-8 text-sm text-slate-600"></div>

    <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-4">
      <a href="/setup.html" class="block bg-white rounded-2xl shadow p-6 hover:shadow-md transition">
        <div class="text-2xl mb-2">⚙️</div>
        <div class="font-semibold text-lg">세팅</div>
        <div class="text-sm text-slate-500">가동 도크 · 작업자 명단 (시작 전)</div>
      </a>
      <a href="/manager.html" class="block bg-white rounded-2xl shadow p-6 hover:shadow-md transition">
        <div class="text-2xl mb-2">🧭</div>
        <div class="font-semibold text-lg">관리 현황판</div>
        <div class="text-sm text-slate-500">도크 종료 입력 · 전체 현황</div>
      </a>
      <a href="/board.html" class="block bg-white rounded-2xl shadow p-6 hover:shadow-md transition">
        <div class="text-2xl mb-2">📺</div>
        <div class="font-semibold text-lg">공용 보드</div>
        <div class="text-sm text-slate-500">작업자용 — 내 다음 자리</div>
      </a>
      <a href="/signal.html" class="block bg-white rounded-2xl shadow p-6 hover:shadow-md transition">
        <div class="text-2xl mb-2">🚦</div>
        <div class="font-semibold text-lg">신호수 알림</div>
        <div class="text-sm text-slate-500">현장 밖 신호수용 — 도크 종료 (스마트폰)</div>
      </a>
    </div>
  </div>

  <script src="/common.js"></script>
  <script>
    onState((s) => {
      const el = document.getElementById('summary');
      if (!s.configured) { el.textContent = '아직 세팅 전입니다. 먼저 [세팅]에서 가동 도크와 작업자를 입력하세요.'; return; }
      el.innerHTML = `가동 <b>${s.stats.active}</b> · 비가동 <b>${s.stats.inactive}</b> · 작업중 <b>${s.stats.working}</b> · 대기 <b>${s.stats.waiting}</b> · 휴게중 <b>${s.stats.onBreak}</b>`;
    });
  </script>
</body>
</html>
