<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리 현황판 · 자동 배치</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800">
  <div class="max-w-6xl mx-auto px-4 py-6">
    <div class="flex items-center justify-between mb-3 flex-wrap gap-2">
      <h1 class="text-2xl font-bold">관리 현황판</h1>
      <div class="flex items-center gap-2 text-sm">
        <a href="/board.html" target="_blank" class="px-3 py-1.5 rounded-lg bg-slate-200 hover:bg-slate-300">📺 공용 보드 열기</a>
        <a href="/setup.html" class="px-3 py-1.5 rounded-lg bg-slate-200 hover:bg-slate-300">⚙️ 세팅</a>
        <button id="reset" class="px-3 py-1.5 rounded-lg bg-red-50 text-red-600 hover:bg-red-100">하루 리셋</button>
      </div>
    </div>

    <div id="summary" class="mb-4 text-sm text-slate-600 bg-white rounded-xl shadow px-4 py-2"></div>
    <div id="notice" class="mb-4 hidden text-sm bg-amber-50 text-amber-700 rounded-xl px-4 py-3"></div>

    <h2 class="font-semibold text-slate-500 text-sm mb-2">도크 (종료할 도크의 버튼을 누르세요)</h2>
    <div id="grid" class="mb-7"></div>

    <h2 class="font-semibold text-slate-500 text-sm mb-2">휴게 · 복귀</h2>
    <div id="breaks" class="grid gap-2" style="grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));"></div>
  </div>

  <script src="/common.js"></script>
  <script src="/manager.js"></script>
</body>
</html>
