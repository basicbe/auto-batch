<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리 현황판 · 자동 배치</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800">
  <div class="max-w-6xl mx-auto px-4 py-6">
    <div class="flex items-center justify-between mb-3 flex-wrap gap-2">
      <h1 class="text-2xl font-bold">관리 현황판</h1>
      <div class="flex items-center gap-1.5 text-sm flex-wrap">
        <a href="/board.html" target="_blank" class="inline-flex items-center gap-1.5 px-3 py-2 rounded-lg bg-white border border-slate-200 text-slate-700 shadow-sm hover:bg-slate-50 hover:border-slate-300 transition">📺 공용 보드</a>
        <a href="/signal.html" target="_blank" class="inline-flex items-center gap-1.5 px-3 py-2 rounded-lg bg-white border border-slate-200 text-slate-700 shadow-sm hover:bg-slate-50 hover:border-slate-300 transition">🚦 신호수 알림</a>
        <a href="/setup.html" class="inline-flex items-center gap-1.5 px-3 py-2 rounded-lg bg-white border border-slate-200 text-slate-700 shadow-sm hover:bg-slate-50 hover:border-slate-300 transition">⚙️ 세팅</a>
        <button id="reset" class="inline-flex items-center gap-1.5 px-3 py-2 rounded-lg bg-white border border-red-200 text-red-600 shadow-sm hover:bg-red-50 transition">↻ 하루 리셋</button>
      </div>
    </div>

    <div id="summary" class="mb-2 text-sm text-slate-600 bg-white rounded-xl shadow px-4 py-2"></div>
    <div id="queue" class="mb-4 text-xs bg-white rounded-xl shadow px-4 py-2 hidden"></div>

    <div id="notice" class="mb-4 hidden text-sm bg-amber-50 text-amber-700 rounded-xl px-4 py-3"></div>

    <!-- 상단 탭: 작업종료(도크) / 특공대 / 휴게중 -->
    <div id="mainTabs" class="flex gap-1 bg-white border border-slate-200 rounded-2xl p-1.5 mb-5 shadow-sm"></div>

    <!-- 작업종료(도크) 패널 -->
    <section id="panel-docks">
      <h2 class="font-semibold text-slate-500 text-sm mb-2">도크 (종료할 도크의 버튼을 누르세요)</h2>
      <div id="zoneTabs" class="inline-flex bg-slate-200 rounded-xl p-1 mb-4"></div>
      <div id="grid"></div>
    </section>

    <!-- 특공대 패널 -->
    <section id="panel-commandos" class="hidden">
      <h2 id="commandoTitle" class="font-semibold text-slate-500 text-sm mb-2">🛠 특공대</h2>
      <div id="commandos" class="grid gap-2" style="grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));"></div>
    </section>

    <!-- 휴게중 패널 -->
    <section id="panel-breaks" class="hidden">
      <h2 class="font-semibold text-slate-500 text-sm mb-2">휴게 · 복귀</h2>
      <div id="breaks" class="grid gap-2" style="grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));"></div>
    </section>
  </div>

  <script src="/common.js"></script>
  <script src="/manager.js"></script>
</body>
</html>
